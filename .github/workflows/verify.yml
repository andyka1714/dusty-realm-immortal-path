name: Verify client

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run verify
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: production-build-audit
          path: |
            dist/
            test-results/
            playwright-report/
          if-no-files-found: ignore
